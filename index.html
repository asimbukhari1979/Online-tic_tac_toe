<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #1f1f2e, #0b0b12);
  font-family: Arial, sans-serif;
  color:white;
}

.container{
  text-align:center;
}

h1{
  margin-bottom:10px;
  text-shadow:0 0 10px cyan;
}

.board{
  display:grid;
  grid-template-columns:repeat(3,100px);
  grid-template-rows:repeat(3,100px);
  gap:8px;
  margin-top:20px;
}

.cell{
  width:100px;
  height:100px;
  background:rgba(255,255,255,0.05);
  border:2px solid rgba(255,255,255,0.2);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  cursor:pointer;
  transition:0.2s;
  border-radius:12px;
  box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
}

.cell:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px cyan;
}

.cell.x{
  color:#00e5ff;
  text-shadow:0 0 10px #00e5ff;
}

.cell.o{
  color:#ff4d6d;
  text-shadow:0 0 10px #ff4d6d;
}

#status{
  margin-top:15px;
  font-size:18px;
}

button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:cyan;
  font-weight:bold;
}

button:hover{
  background:#00bcd4;
}
</style>
</head>
<body>

<div class="container">
  <h1></h1>

  <div id="status">Player X ka turn hai 😎</div>

  <div class="board" id="board"></div>

  <button onclick="resetGame()">Restart Game</button>
</div>

<script>
let board = Array(9).fill("");
let currentPlayer = "X";
let gameActive = true;

const winPatterns = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

const boardDiv = document.getElementById("board");
const statusDiv = document.getElementById("status");

/* 🔊 SOUND ENGINE */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, duration){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.value = freq;
  osc.type = "sine";

  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);

  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function clickSound(){
  beep(500, 0.08);
}

function winSound(){
  beep(800, 0.15);
  setTimeout(()=>beep(1000,0.15),120);
  setTimeout(()=>beep(1200,0.2),240);
}

function drawSound(){
  beep(200,0.4);
}

// create cells
function createBoard(){
  boardDiv.innerHTML = "";
  board.forEach((_,i)=>{
    const cell = document.createElement("div");
    cell.classList.add("cell");
    cell.dataset.index = i;
    cell.addEventListener("click", handleClick);
    boardDiv.appendChild(cell);
  });
}

function handleClick(e){
  const index = e.target.dataset.index;

  if(board[index] !== "" || !gameActive) return;

  clickSound(); // 🔊 click sound

  board[index] = currentPlayer;
  e.target.textContent = currentPlayer;
  e.target.classList.add(currentPlayer.toLowerCase());

  if(checkWin()){
    statusDiv.textContent = `🎉 Player ${currentPlayer} jeet gaya!`;
    winSound(); // 🔊 win sound
    gameActive = false;
    return;
  }

  if(board.every(cell => cell !== "")){
    statusDiv.textContent = "🤝 Match Draw!";
    drawSound(); // 🔊 draw sound
    gameActive = false;
    return;
  }

  currentPlayer = currentPlayer === "X" ? "O" : "X";
  statusDiv.textContent = `Player ${currentPlayer} ka turn hai 😎`;
}

function checkWin(){
  return winPatterns.some(pattern=>{
    const [a,b,c] = pattern;
    return board[a] && board[a] === board[b] && board[a] === board[c];
  });
}

function resetGame(){
  board = Array(9).fill("");
  currentPlayer = "X";
  gameActive = true;
  statusDiv.textContent = "Player X ka turn hai 😎";
  createBoard();
}

createBoard();
</script>

</body>
</html>
